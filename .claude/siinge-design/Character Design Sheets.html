<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Elemental Waifus · Character Design Sheets</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+JP:wght@400;600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; font-family: 'Inter', system-ui, sans-serif; }
  body { min-height: 100vh; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="character-cards.jsx"></script>
<script type="text/babel" src="character-data.jsx"></script>

<script type="text/babel" data-presets="react">
  // DesignCanvas, DCSection, DCArtboard, DCPostIt, CharacterCard, ROSTER
  // are already in the shared babel scope from prior script tags.

  // Card dimensions — the CharacterCard component is 560 wide, height varies.
  // We give each artboard a tall fixed height so the full sheet is visible.
  const CARD_W = 560;
  const CARD_H = 2180;

  function App() {
    return (
      <DesignCanvas>
        <DCSection
          id="overview"
          title="Elemental Roster · v0.1"
          subtitle="Four original love-interest designs for the dating-sim. Shared anime sprite aesthetic, distinct elemental identities. Each sheet doubles as an art-prompt handoff for your illustrator."
        >
          <DCPostIt x={-40} y={-20} width={260}>
            <strong>Read-me</strong><br/>
            Silhouettes are PLACEHOLDERS — each card\'s final
            prompt is ready to copy into your image generator
            or send to an illustrator. Palette + outfit variants
            are the brief, not the final render.
          </DCPostIt>
          {ROSTER.map((c) => (
            <DCArtboard
              key={c.id}
              id={c.id}
              label={`${c.name} · ${c.element}`}
              width={CARD_W}
              height={CARD_H}
            >
              <CharacterCard data={c} />
            </DCArtboard>
          ))}
        </DCSection>

        <DCSection
          id="notes"
          title="Style Bible · shared across the roster"
          subtitle="Lock these before generation so the four sprites feel like they belong in the same game."
        >
          <DCArtboard id="bible" label="Shared Style Guide" width={820} height={640}>
            <div style={{
              width:'100%', height:'100%', background:'#0e0a0d', color:'#efe6dd',
              padding:40, boxSizing:'border-box', fontFamily:'Inter, sans-serif',
              display:'flex', flexDirection:'column', gap:18,
            }}>
              <div style={{fontFamily:'Cinzel, serif', fontSize:28, letterSpacing:'0.04em'}}>
                Shared Style Guide
              </div>
              <div style={{fontSize:13, lineHeight:1.6, opacity:0.8, maxWidth:680}}>
                Append these phrases to every character prompt so the four
                sprites feel consistent. Swap the <em>element-specific</em> tokens
                per character (see each card\'s prompt field).
              </div>

              {[
                {label:'Format', val:'full body vertical composition 2:3, visual novel character sprite, no borders, transparent background optional'},
                {label:'Line + Shading', val:'cel-shaded anime illustration, clean confident line art, soft painterly shadows, subtle subsurface on skin'},
                {label:'Proportions', val:'young-adult proportions, 7 heads tall, expressive hands, natural relaxed poses — no stiff T-pose'},
                {label:'Lighting', val:'strong key light from the character\'s element (fire = warm below, ice = cool above, light = golden wrap, shadow = violet rim), soft ambient fill'},
                {label:'Face', val:'large expressive eyes with element-tinted highlights, soft brows, defined lashes, mouth slightly parted for dialogue-ready expression'},
                {label:'Negative', val:'no extra fingers, no warped anatomy, no muddy colors, no photorealism, no chibi proportions, no heavy text or watermarks'},
              ].map(row=>(
                <div key={row.label} style={{display:'grid', gridTemplateColumns:'140px 1fr', gap:16, alignItems:'start'}}>
                  <div style={{
                    fontFamily:'JetBrains Mono, monospace', fontSize:10,
                    letterSpacing:'0.25em', textTransform:'uppercase', opacity:0.55,
                    paddingTop:3,
                  }}>{row.label}</div>
                  <div style={{
                    fontFamily:'JetBrains Mono, monospace', fontSize:12, lineHeight:1.55,
                    opacity:0.9, background:'rgba(255,255,255,0.04)',
                    border:'1px solid rgba(255,255,255,0.08)',
                    padding:'10px 14px', borderRadius:3,
                  }}>{row.val}</div>
                </div>
              ))}
            </div>
          </DCArtboard>

          <DCArtboard id="palette-overview" label="Elemental Accents" width={560} height={640}>
            <div style={{
              width:'100%', height:'100%', background:'#0e0a0d', color:'#efe6dd',
              padding:40, boxSizing:'border-box', display:'flex', flexDirection:'column', gap:22,
              fontFamily:'Inter, sans-serif',
            }}>
              <div style={{fontFamily:'Cinzel, serif', fontSize:26}}>Elemental Accents</div>
              <div style={{fontSize:12, opacity:0.65, lineHeight:1.55}}>
                One accent per character. Same chroma family, different hue —
                so they read as siblings on the character select screen.
              </div>
              {ROSTER.map(c=>(
                <div key={c.id} style={{display:'flex', alignItems:'center', gap:16}}>
                  <div style={{
                    width:56, height:56, borderRadius:2, background:c.accent,
                    boxShadow:`0 0 40px -8px ${c.accent}`,
                  }}/>
                  <div style={{flex:1}}>
                    <div style={{fontFamily:'Cinzel, serif', fontSize:18, color:c.accent}}>{c.name}</div>
                    <div style={{fontSize:11, opacity:0.6, fontFamily:'JetBrains Mono, monospace', letterSpacing:'0.2em', textTransform:'uppercase'}}>
                      {c.element} · {c.accent}
                    </div>
                  </div>
                  <div style={{display:'flex', gap:4}}>
                    {c.palette.map(p=>(
                      <div key={p} style={{width:18, height:36, background:p, borderRadius:1}}/>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </DCArtboard>
        </DCSection>

        <DCSection
          id="selector"
          title="Mock · Character Select Screen"
          subtitle="How the four cards land on a single UI together. Layout reference only."
        >
          <DCArtboard id="select-screen" label="Character Select — mock" width={1280} height={720}>
            <div style={{
              width:'100%', height:'100%', background:'#0a0710',
              backgroundImage:'radial-gradient(ellipse at center, rgba(90,60,140,0.22), transparent 70%)',
              color:'#efe6dd', padding:'48px 60px', boxSizing:'border-box',
              fontFamily:'Inter, sans-serif', display:'flex', flexDirection:'column', gap:32,
            }}>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline'}}>
                <div>
                  <div style={{fontFamily:'JetBrains Mono, monospace', fontSize:10, letterSpacing:'0.3em', opacity:0.55, textTransform:'uppercase'}}>Chapter 01 · Choose</div>
                  <div style={{fontFamily:'Cinzel, serif', fontSize:42, letterSpacing:'0.04em'}}>Who will you spend the night with?</div>
                </div>
                <div style={{fontFamily:'JetBrains Mono, monospace', fontSize:10, letterSpacing:'0.25em', opacity:0.5}}>04 / 04 UNLOCKED</div>
              </div>

              <div style={{display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:20, flex:1}}>
                {ROSTER.map(c=>(
                  <div key={c.id} style={{
                    position:'relative', borderRadius:4, overflow:'hidden',
                    border:`1px solid ${c.accent}55`,
                    background:`linear-gradient(180deg, ${c.deep} 0%, #05030a 100%)`,
                    boxShadow:`0 0 80px -30px ${c.accent}`,
                    display:'flex', flexDirection:'column',
                  }}>
                    <div style={{position:'relative', flex:1, overflow:'hidden'}}>
                      <svg width="100%" height="100%" viewBox="0 0 100 150" preserveAspectRatio="xMidYMid slice" style={{display:'block'}}>
                        <defs>
                          <radialGradient id={`g-${c.id}`} cx="50%" cy="40%" r="60%">
                            <stop offset="0%" stopColor={c.accent} stopOpacity="0.5"/>
                            <stop offset="100%" stopColor={c.deep} stopOpacity="0"/>
                          </radialGradient>
                        </defs>
                        <rect width="100" height="150" fill={`url(#g-${c.id})`} />
                        <g fill="rgba(0,0,0,0.4)" stroke="rgba(255,255,255,0.15)" strokeWidth="0.4">
                          <ellipse cx="50" cy="38" rx="10" ry="13"/>
                          <path d="M50 51 L40 68 L38 110 L44 150 L56 150 L62 110 L60 68 Z"/>
                        </g>
                      </svg>
                      <div style={{
                        position:'absolute', top:10, right:10,
                        fontFamily:'JetBrains Mono, monospace', fontSize:9, letterSpacing:'0.2em',
                        padding:'3px 7px', border:`1px solid ${c.accent}`, color:c.accent,
                        textTransform:'uppercase', borderRadius:1,
                      }}>{c.element.split(' ')[0]}</div>
                    </div>
                    <div style={{padding:'16px 18px', borderTop:`1px solid ${c.accent}33`}}>
                      <div style={{fontFamily:'Cinzel, serif', fontSize:22, color:c.accent, letterSpacing:'0.04em'}}>{c.name}</div>
                      <div style={{fontSize:10.5, opacity:0.7, marginTop:4, fontStyle:'italic', lineHeight:1.4}}>{c.epithet}</div>
                    </div>
                  </div>
                ))}
              </div>

              <div style={{
                display:'flex', justifyContent:'space-between', alignItems:'center',
                fontFamily:'JetBrains Mono, monospace', fontSize:10, letterSpacing:'0.25em',
                opacity:0.55, textTransform:'uppercase',
              }}>
                <span>◀ BACK</span>
                <span>↵ CONFIRM</span>
              </div>
            </div>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
