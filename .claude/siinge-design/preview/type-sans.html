<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Type · UI Sans</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px 32px;background:var(--paper)}
  .row{display:flex;align-items:baseline;justify-content:space-between;border-bottom:1px solid var(--border-soft);padding:8px 0}
  .row:last-child{border-bottom:none}
  .meta{font-family:var(--font-sans);font-size:10px;color:var(--ink-4);text-transform:uppercase;letter-spacing:.18em;font-weight:600;flex-shrink:0;margin-left:24px}
  .e{font-family:var(--font-sans);font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-3);margin-bottom:4px}
</style></head>
<body>
  <div class="e">Inter · UI</div>
  <div class="row"><div class="head-3" style="font-size:22px">Active pipeline value</div><div class="meta">28 / H3 · 600</div></div>
  <div class="row"><div class="head-5" style="font-size:16px">Catalina Beach Studio</div><div class="meta">18 / H5 · 600</div></div>
  <div class="row"><div class="body">Real-time insights on deal flow, revenue, and client segments.</div><div class="meta">16 / Body · 400</div></div>
  <div class="row"><div class="body-sm">Manage your leads and active clients.</div><div class="meta">14 / Small · 400</div></div>
  <div class="row"><div class="eyebrow">Authorized personnel only</div><div class="meta">12 / Eyebrow · 600</div></div>
</body></html>
