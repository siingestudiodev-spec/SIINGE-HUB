<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Color · Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--paper);font-family:var(--font-sans)}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
  .sw{height:96px;border-radius:var(--r-2);border:1px solid var(--border-soft);position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;padding:10px}
  .sw .name{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.18em;color:var(--ink-2)}
  .sw .hex{font-family:var(--font-mono);font-size:10px;color:var(--ink-3);margin-top:2px}
  .sw.dark .name,.sw.dark .hex{color:#FAF7F2}
  .sw.dark .hex{color:#A39C8E}
  .row{margin-top:14px;font-family:var(--font-display);font-size:14px;font-style:italic;color:var(--ink-3);letter-spacing:0}
</style></head>
<body>
  <div class="grid">
    <div class="sw" style="background:#FAF7F2"><div class="name">Paper</div><div class="hex">#FAF7F2</div></div>
    <div class="sw" style="background:#F3EEE5"><div class="name">Paper-2</div><div class="hex">#F3EEE5</div></div>
    <div class="sw" style="background:#E8E2D6"><div class="name">Paper-3</div><div class="hex">#E8E2D6</div></div>
    <div class="sw" style="background:#FFFFFF"><div class="name">Bone</div><div class="hex">#FFFFFF</div></div>
    <div class="sw" style="background:#EDE7DA"><div class="name">Bone Edge</div><div class="hex">#EDE7DA</div></div>
    <div class="sw dark" style="background:#0E0E0C"><div class="name">Ink</div><div class="hex">#0E0E0C</div></div>
    <div class="sw dark" style="background:#2A2724"><div class="name">Ink-2</div><div class="hex">#2A2724</div></div>
    <div class="sw" style="background:#6B655C"><div class="name" style="color:#FAF7F2">Ink-3</div><div class="hex" style="color:#FAF7F2">#6B655C</div></div>
    <div class="sw" style="background:#A39C8E"><div class="name">Ink-4</div><div class="hex">#A39C8E</div></div>
    <div class="sw" style="background:#C9C2B4"><div class="name">Ink-5</div><div class="hex">#C9C2B4</div></div>
  </div>
  <div class="row">Ink on warm paper · ten neutrals do 95% of the work.</div>
</body></html>
