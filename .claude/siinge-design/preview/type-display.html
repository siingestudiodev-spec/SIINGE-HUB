<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Type · Display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px 32px;background:var(--paper)}
  .row{display:flex;align-items:baseline;justify-content:space-between;border-bottom:1px solid var(--border-soft);padding:8px 0}
  .row:last-child{border-bottom:none}
  .meta{font-family:var(--font-sans);font-size:10px;color:var(--ink-4);text-transform:uppercase;letter-spacing:.18em;font-weight:600;flex-shrink:0;margin-left:24px}
  .e{font-family:var(--font-sans);font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-3);margin-bottom:4px}
</style></head>
<body>
  <div class="e">Cormorant Garamond · Display</div>
  <div class="row"><div class="display-hero" style="font-size:56px">Sales pipeline</div><div class="meta">72 / Hero</div></div>
  <div class="row"><div class="display-1" style="font-size:40px">Catalina Beach Studio</div><div class="meta">48 / H1</div></div>
  <div class="row"><div class="display-2" style="font-size:30px">Strategy call intake</div><div class="meta">36 / H2</div></div>
</body></html>
