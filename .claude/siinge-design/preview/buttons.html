<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--paper);font-family:var(--font-sans)}
  .row{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
  .btn{font-family:var(--font-sans);font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;padding:11px 18px;border-radius:4px;border:1px solid var(--ink);cursor:pointer;background:var(--ink);color:var(--paper);transition:opacity 120ms}
  .btn:hover{opacity:.85}
  .btn.ghost{background:transparent;color:var(--ink)}
  .btn.ember{background:var(--ember);border-color:var(--ember);color:#fff}
  .btn.danger{background:transparent;color:var(--critical);border-color:var(--critical)}
  .btn.sm{padding:6px 12px;font-size:10px}
  .btn.lg{padding:14px 24px;font-size:12px}
  .btn[disabled]{opacity:.4;cursor:not-allowed}
  .lbl{font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-3);width:80px}
</style></head>
<body>
  <div class="row"><div class="lbl">Primary</div><button class="btn">Sign In</button><button class="btn ember">Send NDA</button><button class="btn ghost">Cancel</button><button class="btn danger">Delete</button><button class="btn" disabled>Saving…</button></div>
  <div class="row"><div class="lbl">Sizes</div><button class="btn sm">Edit</button><button class="btn">Save</button><button class="btn lg">I Agree and Sign</button></div>
</body></html>
