<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Type · Editorial Pairing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:32px 36px;background:var(--paper)}
  .stack{max-width:560px}
  .eb{font-family:var(--font-sans);font-size:11px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-3)}
  .ti{font-family:var(--font-display);font-size:48px;line-height:1.0;letter-spacing:-.02em;color:var(--ink);margin-top:8px}
  .meta{display:flex;gap:24px;margin-top:16px;padding-top:12px;border-top:1px solid var(--ink)}
  .meta div{display:flex;flex-direction:column;gap:2px}
  .meta .k{font-family:var(--font-sans);font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-4)}
  .meta .v{font-family:var(--font-mono);font-size:13px;color:var(--ink-2)}
</style></head>
<body>
  <div class="stack">
    <div class="eb">Record · 4F2A9C8E</div>
    <div class="ti"><em>Catalina</em> Beach Studio</div>
    <div class="meta">
      <div><div class="k">Stage</div><div class="v">Proposal Sent</div></div>
      <div><div class="k">Value</div><div class="v">$24,800</div></div>
      <div><div class="k">Owner</div><div class="v">JK</div></div>
    </div>
  </div>
</body></html>
