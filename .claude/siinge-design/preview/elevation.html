<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Elevation</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:32px;background:var(--paper);font-family:var(--font-sans)}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:24px}
  .card{background:var(--bone);height:78px;border-radius:4px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px}
  .tok{font-family:var(--font-mono);font-size:10px;color:var(--ink-3)}
  .role{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.18em;color:var(--ink-4);margin-top:2px}
  .e1{box-shadow:0 1px 0 rgba(14,14,12,0.04),0 1px 2px rgba(14,14,12,0.04);border:1px solid var(--border-soft)}
  .e2{box-shadow:0 1px 0 rgba(14,14,12,0.04),0 8px 20px -12px rgba(14,14,12,0.18);border:1px solid var(--border-soft)}
  .e3{box-shadow:0 24px 60px -32px rgba(14,14,12,0.28);border:1px solid var(--border-soft)}
  .e0{border:1px solid var(--ink-5)}
</style></head>
<body>
  <div class="grid">
    <div><div class="card e0"><div class="tok">--shadow-0</div><div class="role">Hairline</div></div></div>
    <div><div class="card e1"><div class="tok">--shadow-1</div><div class="role">Hover row</div></div></div>
    <div><div class="card e2"><div class="tok">--shadow-2</div><div class="role">Menu</div></div></div>
    <div><div class="card e3"><div class="tok">--shadow-3</div><div class="role">Modal</div></div></div>
  </div>
</body></html>
