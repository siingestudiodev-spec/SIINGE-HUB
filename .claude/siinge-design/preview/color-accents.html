<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Color · Accents</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--paper);font-family:var(--font-sans)}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .pair{border:1px solid var(--border-soft);border-radius:var(--r-2);overflow:hidden;background:var(--bone)}
  .strong{height:60px;display:flex;align-items:center;padding:0 12px;color:#FAF7F2;font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase}
  .soft{height:34px;display:flex;align-items:center;padding:0 12px;font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;border-top:1px solid var(--border-soft)}
  .meta{padding:8px 12px;font-family:var(--font-mono);font-size:10px;color:var(--ink-3);border-top:1px solid var(--border-soft)}
  .role{padding:6px 12px 10px;font-family:var(--font-display);font-style:italic;font-size:13px;color:var(--ink-3);line-height:1.3}
</style></head>
<body>
  <div class="grid">
    <div class="pair">
      <div class="strong" style="background:#C2410C">Ember</div>
      <div class="soft" style="background:#F3D9C5;color:#7C2D12">Soft</div>
      <div class="meta">#C2410C / #F3D9C5</div>
      <div class="role">CTA emphasis. One per screen.</div>
    </div>
    <div class="pair">
      <div class="strong" style="background:#4F6B3A">Positive</div>
      <div class="soft" style="background:#E5EAD9;color:#4F6B3A">Soft</div>
      <div class="meta">#4F6B3A / #E5EAD9</div>
      <div class="role">Won, signed, confirmed.</div>
    </div>
    <div class="pair">
      <div class="strong" style="background:#B5841E">Caution</div>
      <div class="soft" style="background:#F5E9C8;color:#7A5512">Soft</div>
      <div class="meta">#B5841E / #F5E9C8</div>
      <div class="role">Pending, in-flight, sent.</div>
    </div>
    <div class="pair">
      <div class="strong" style="background:#8C2A2A">Critical</div>
      <div class="soft" style="background:#F1DAD3;color:#8C2A2A">Soft</div>
      <div class="meta">#8C2A2A / #F1DAD3</div>
      <div class="role">Destructive. Churn. Error.</div>
    </div>
  </div>
</body></html>
