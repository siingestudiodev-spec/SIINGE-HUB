<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--paper);font-family:var(--font-sans)}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px}
  .item{display:flex;flex-direction:column;align-items:center;gap:8px}
  .box{width:72px;height:72px;background:var(--bone);border:1px solid var(--ink-5)}
  .arch{width:80px;height:72px;border-radius:50% 50% 4px 4px / 50% 50% 4px 4px;background:var(--bone);border:1px solid var(--ink-5)}
  .tok{font-family:var(--font-mono);font-size:10px;color:var(--ink-3)}
  .role{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.18em;color:var(--ink-4)}
</style></head>
<body>
  <div class="grid">
    <div class="item"><div class="box" style="border-radius:0"></div><div class="tok">--r-0</div><div class="role">Rule</div></div>
    <div class="item"><div class="box" style="border-radius:2px"></div><div class="tok">--r-1</div><div class="role">Chip</div></div>
    <div class="item"><div class="box" style="border-radius:4px"></div><div class="tok">--r-2</div><div class="role">Button</div></div>
    <div class="item"><div class="box" style="border-radius:8px"></div><div class="tok">--r-3</div><div class="role">Modal</div></div>
    <div class="item"><div class="box" style="border-radius:999px;width:24px;height:24px;margin-top:24px;margin-bottom:24px"></div><div class="tok">--r-pill</div><div class="role">Dot</div></div>
    <div class="item"><div class="arch"></div><div class="tok">--r-arch</div><div class="role">Brand</div></div>
  </div>
</body></html>
